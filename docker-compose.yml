services:
  # MySQL 数据库服务
  db:
    image: mysql:8.0
    container_name: shop-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: shop_db
      MYSQL_USER: shop_user
      MYSQL_PASSWORD: shop_password
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - shop-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Redis 服务
  redis:
    image: redis:7-alpine
    container_name: shop-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - shop-network
    command: redis-server --appendonly yes

  # Elasticsearch 服务 (用于商品搜索)
  elasticsearch:
    image: elasticsearch:7.17.23
    container_name: shop-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - shop-network

  # 后端 Django 服务
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: shop-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      elasticsearch:
        condition: service_started
    environment:
      - DEBUG=False
      - DJANGO_SETTINGS_MODULE=Mall_Backend.settings
      - ALLOWED_HOSTS=*
      - ELASTICSEARCH_HOST=elasticsearch:9200
      - DATABASE_HOST=db
      - DATABASE_PORT=3306
      - DATABASE_NAME=shop_db
      - DATABASE_USER=root
      - DATABASE_PASSWORD=root
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    ports:
      - "8000:8000"
    volumes:
      - ./media:/app/media
      - ./apps:/app/apps
      - ./Mall_Backend:/app/Mall_Backend
      # 【新增】静态文件卷，用于收集 Django admin 等静态资源
      - static_files:/app/static
    networks:
      - shop-network
    command: >
      sh -c "
        echo '等待数据库就绪...' &&
        sleep 10 &&
        pip install celery -i https://pypi.tuna.tsinghua.edu.cn/simple &&
        python manage.py migrate &&
        python manage.py collectstatic --noinput &&
        exec gunicorn --bind 0.0.0.0:8000 --workers 3 Mall_Backend.wsgi:application
      "

  # 前端 Vue 服务
  frontend:
    build:
      context: ./Mall_Frontend
      dockerfile: Dockerfile
    container_name: shop-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - shop-network
    # 使用自定义 Nginx 配置
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # 【核心】挂载后端 media 目录，实现动静分离
      # Nginx 直接提供媒体文件服务，无需经过 Django
      - ./media:/app/media:ro
      # Django 静态文件（admin 后台 CSS/JS 等）
      - static_files:/app/static:ro

  # Celery 工作者（可选，如果需要后台任务）
  # celery-worker:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.backend
  #   container_name: shop-celery-worker
  #   restart: unless-stopped
  #   depends_on:
  #     - redis
  #     - backend
  #   environment:
  #     - DJANGO_SETTINGS_MODULE=Mall_Backend.settings
  #     - CELERY_BROKER_URL=redis://redis:6379/0
  #     - CELERY_RESULT_BACKEND=redis://redis:6379/1
  #   volumes:
  #     - ./media:/app/media
  #     - ./apps:/app/apps
  #     - ./Mall_Backend:/app/Mall_Backend
  #   networks:
  #     - shop-network
  #   command: celery -A Mall_Backend worker --loglevel=info

  # Celery Beat 调度器（可选，如果需要定时任务）
  # celery-beat:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.backend
  #   container_name: shop-celery-beat
  #   restart: unless-stopped
  #   depends_on:
  #     - redis
  #     - backend
  #   environment:
  #     - DJANGO_SETTINGS_MODULE=Mall_Backend.settings
  #     - CELERY_BROKER_URL=redis://redis:6379/0
  #     - CELERY_RESULT_BACKEND=redis://redis:6379/1
  #   volumes:
  #     - ./media:/app/media
  #     - ./apps:/app/apps
  #     - ./Mall_Backend:/app/Mall_Backend
  #   networks:
  #     - shop-network
  #   command: celery -A Mall_Backend beat --loglevel=info

networks:
  shop-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  es_data:
    driver: local
  # 【新增】Django 静态文件卷，用于 Nginx 动静分离
  static_files:
    driver: local