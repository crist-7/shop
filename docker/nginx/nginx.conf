user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # ============================================================
    # 基础性能优化配置
    # ============================================================
    sendfile on;           # 启用零拷贝，高效传输文件
    tcp_nopush on;         # 优化数据包发送
    tcp_nodelay on;        # 禁用 Nagle 算法，减少延迟
    keepalive_timeout 65;  # 长连接超时时间
    types_hash_max_size 2048;
    client_max_body_size 20m;

    # ============================================================
    # Gzip 压缩配置
    # ============================================================
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/xml+rss application/json
               application/x-javascript image/svg+xml;

    # 启用 Gzip 预压缩文件支持（配合 vite-plugin-compression）
    gzip_static on;

    # ============================================================
    # 静态资源缓存配置
    # ============================================================
    map $uri $ext $static_cache_control {
        ~*\.(jpg|jpeg|png|gif|ico|webp|svg)$    "public, max-age=31536000, immutable";
        ~*\.(css|js)$                           "public, max-age=31536000, immutable";
        ~*\.(woff|woff2|ttf|eot|otf)$            "public, max-age=31536000, immutable";
        default                                 "public, max-age=86400";
    }

    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # ============================================================
        # 前端静态文件
        # ============================================================
        location / {
            try_files $uri $uri/ /index.html;

            # 静态资源缓存
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control $static_cache_control;
                access_log off;
            }
        }

        # ============================================================
        # 后端 API 代理
        # ============================================================
        location /api/ {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 超时配置
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ============================================================
        # 【核心优化】媒体文件动静分离
        # Nginx 直接响应媒体文件，不再转发给 Django
        # 性能提升：避免 Django 处理静态文件的额外开销
        # ============================================================
        location /media/ {
            # 直接从共享卷读取文件
            alias /app/media/;

            # 静态资源缓存（图片缓存 1 年）
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header X-Content-Type-Options "nosniff";
            access_log off;

            # 防盗链（可选，防止其他网站盗用图片）
            # valid_referers none blocked localhost *.yourdomain.com;
            # if ($invalid_referer) {
            #     return 403;
            # }

            # 开启 sendfile 优化大文件传输
            sendfile on;
            tcp_nopush on;
            tcp_nodelay on;
        }

        # ============================================================
        # Django 静态文件（admin 后台等）
        # ============================================================
        location /static/ {
            alias /app/static/;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
        }

        # ============================================================
        # 健康检查
        # ============================================================
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
